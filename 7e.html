<!DOCTYPE html>
<html>

    <body>

        <script>
            function convertToCelsius(fahrenheit){
                const celsius = (fahrenheit-32)*5/9;
                return celsius;
            }
            const fahrenheit = 23;
            const celsius  = convertToCelsius(fahrenheit);
            console.log(celsius);
        </script>
    </body>
</html>
