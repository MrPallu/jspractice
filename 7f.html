<!DOCTYPE html>
<html>

<head></head>

<body>

    <script>
        function convertTemprature(temp, tempType) {
            if (tempType === 'F') {
                const C = (temp - 32) * 5 / 9;
                return C + 'C';
            }
            if (tempType === 'C') {
                const F = (temp * 9 / 5) + 32;
                return F + 'F';
            }
        }

        const temp = convertTemprature(25,'C');
        console.log(temp);
    </script>
</body>

</html>
