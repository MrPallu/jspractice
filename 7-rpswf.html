<!DOCTYPE html>
<html>

<head>
    <title>RockPaperScissor</title>
    <link rel='stylesheet' href="general.css">
</head>

<body>
    <p class="header">Rock Paper Scissors</p>

    <button class="rock-button" onclick="
        playGame('rock');
        ">
        <p class="emoji">&#x270A;</p>
        <p class="move-txt">Rock</p>
    </button>
    <button class="paper-button" onclick="
        playGame('paper');
        ">
        <p class="emoji">&#9995;</p>
        <p class="move-txt">Paper</p>
    </button>
    <button class="scissors-button" onclick="
        playGame('scissors');
        ">
        <p class="emoji">&#x270C;</p>
        <p class="move-txt">Scissors</p>
    </button>
    <script>
        function playGame(playerMove) {
            const computerMove = pickComputerMove();
            let result = '';

            if (playerMove === 'rock') {
                if (computerMove === 'rock') {
                    result = 'Tie';
                }
                else if (computerMove === 'paper') {
                    result = 'Computer Wins';
                }
                else if (computerMove === 'scissors') {
                    result = 'You Win';
                }
            }
            if (playerMove === 'paper') {
                if (computerMove === 'rock') {
                    result = 'You Win';
                }
                else if (computerMove === 'paper') {
                    result = 'Tie';
                }
                else if (computerMove === 'scissors') {
                    result = 'Computer Wins';
                }
            }

            if (playerMove === 'scissors') {
                if (computerMove === 'rock') {
                    result = 'Computer Wins';
                }
                else if (computerMove === 'paper') {
                    result = 'You Win';
                }
                else if (computerMove === 'scissors') {
                    result = 'Tie';
                }
            }
            alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}.`);
        }
        function pickComputerMove() {
            let computerMove = '';
            const randomNumber = Math.random();
            let result = '';
            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'rock';
            }
            else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                computerMove = 'paper';
            }
            else if (randomNumber >= 2 / 3 && randomNumber < 1) {
                computerMove = 'scissors';
            }
            console.log(computerMove);

            return computerMove;
        }
    </script>
</body>

</html>
