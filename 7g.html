<!DOCTYPE html>
<html>

<head></head>

<body>

    <script>
        function convertLength(length,from,to){
            if(from==='km' && to==='miles'){
                return (length/16)*10+' miles';
            }
            if(from==='miles' && to==='km'){
                return length*16*0.1+' km';
            }
            if(from==='km' && to==='ft'){
                return length*3281+' ft';
            }
            if(from==='miles' && to==='ft'){
                return length*5280+' ft';
            }
            if(from==='ft' && to==='miles'){
                return length/5280+' miles';
            }
            if(from==='ft' && to==='km'){
                return length/3281+' km';
            }
            
            else{
                return `Invalid unit:${to}`;
            }
        }

        let convertedLength = convertLength(50,'ft','ft')
        console.log(convertedLength);
    </script>
</body>

</html>
